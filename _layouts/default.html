<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
{% if page.description or site.description %}<meta name="description" content="{{ page.description | default: site.description }}">{% endif %}
<link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/favicon.png' | relative_url }}">
<style>
  :root {
    --text: #1a1a1a;
    --muted: #666;
    --accent: #00D7FF;
    --border: #eee;
    --bg: #fff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrapper {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  header {
    padding-bottom: 32px;
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
  }
  header a.logo-link {
    display: inline-block;
    line-height: 0;
  }
  header img.logo {
    height: 40px;
    width: auto;
  }
  section h1 {
    font-size: 28px;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  section h2 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 40px;
    margin-bottom: 12px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  section h3 {
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 8px;
  }
  section p, section li { font-size: 15px; }
  section strong { font-weight: 600; }
  section a { color: var(--accent); text-decoration: none; }
  section a:hover { text-decoration: underline; }
  section code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
    background: #f5f5f5;
    padding: 2px 6px;
    border-radius: 4px;
  }
  section table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }
  section th, section td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  section th {
    background: #fafafa;
    font-weight: 600;
  }
  section hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="wrapper">
<header>
<a class="logo-link" href="{{ '/' | relative_url }}"><img class="logo" src="{{ '/assets/logo.svg' | relative_url }}" alt="Keeping"></a>
</header>
<section>
{{ content }}
</section>
<footer>
© {{ 'now' | date: "%Y" }} Keeping. <a href="mailto:keeping.app.support@gmail.com">keeping.app.support@gmail.com</a>
</footer>
</div>
</body>
</html>
