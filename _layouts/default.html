<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
{% if page.description or site.description %}<meta name="description" content="{{ page.description | default: site.description }}">{% endif %}
<link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/favicon.png' | relative_url }}">
<style>
  :root {
    --text: #1a1a1a;
    --muted: #666;
    --accent: #00D7FF;
    --accent-soft: #e6fbff;
    --accent-border: #cfeff5;
    --border: #eee;
    --bg: #fff;
    --header-h: 68px;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255,255,255,0.88);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex;
    align-items: center;
  }
  .site-header .inner {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px;
  }
  .site-header a.logo-link {
    display: inline-block;
    line-height: 0;
  }
  .site-header img.logo {
    height: 28px;
    width: auto;
  }
  .wrapper {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  section h1 {
    font-size: 28px;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    scroll-margin-top: calc(var(--header-h) + 16px);
  }
  section h2 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 40px;
    margin-bottom: 12px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    scroll-margin-top: calc(var(--header-h) + 16px);
  }
  section h3 {
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 8px;
    scroll-margin-top: calc(var(--header-h) + 16px);
  }
  section p, section li { font-size: 15px; }
  section strong { font-weight: 600; }
  section a { color: var(--accent); text-decoration: none; }
  section a:hover { text-decoration: underline; }
  section code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
    background: #f5f5f5;
    padding: 2px 6px;
    border-radius: 4px;
  }
  section table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 14px;
  }
  section th, section td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  section th {
    background: #fafafa;
    font-weight: 600;
  }
  section hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }

  /* 핵심 요약 박스 */
  .summary {
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    padding: 20px 24px;
    margin: 24px 0 32px;
  }
  .summary h3 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 700;
    border: none !important;
    padding: 0 !important;
  }
  .summary ul {
    margin: 0;
    padding-left: 20px;
  }
  .summary li {
    margin: 4px 0;
    font-size: 14px;
  }

  /* 목차 */
  .toc-title {
    font-size: 15px !important;
    font-weight: 600;
    margin: 0 0 10px !important;
    padding: 0 !important;
    border: none !important;
    color: var(--muted);
  }
  #markdown-toc {
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px 16px 40px;
    margin: 0 0 40px;
    font-size: 14px;
    line-height: 1.8;
  }
  #markdown-toc li { margin: 0; }
  #markdown-toc a { color: var(--text); }
  #markdown-toc a:hover { color: var(--accent); }

  /* 섹션 끝 맨 위로 */
  .to-top {
    display: inline-block;
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
  }

  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--muted); text-decoration: underline; }

  @media print {
    .site-header { position: static; background: none; border: none; }
    .wrapper { padding: 16px; }
    #markdown-toc { display: none; }
    .summary { border: 1px solid #ccc; background: none; }
  }
</style>
</head>
<body>
<header class="site-header">
  <div class="inner">
    <a class="logo-link" href="{{ '/' | relative_url }}"><img class="logo" src="{{ '/assets/logo.svg' | relative_url }}" alt="Keeping"></a>
  </div>
</header>
<div class="wrapper">
<section>
{{ content }}
</section>
<footer>
© {{ 'now' | date: "%Y" }} Keeping. <a href="mailto:keeping.app.support@gmail.com">keeping.app.support@gmail.com</a>
</footer>
</div>
</body>
</html>
